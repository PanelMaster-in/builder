name: Build Linux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        php:
          - 7.4
          - 8.0
          - 8.1
          - 8.2
          - 8.3
          - 8.4
          - 8.5

    steps:
      - uses: actions/checkout@v4

      - run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            bison \
            re2c \
            libxml2-dev \
            libssl-dev

      - run: chmod +x scripts/build-linux.sh

      - run: |
          VERSION=$(jq -r '."${{ matrix.php }}"' manifests/php.json)
          ./scripts/build-linux.sh $VERSION

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.php }}
          path: output/*