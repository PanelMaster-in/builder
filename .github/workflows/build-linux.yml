name: Build Linux

on:
  push:
    paths:
      - "manifests/php.json"
  workflow_dispatch:
    inputs:
      php_version:
        description: "PHP Version to build (e.g., 8.3.23 or 'all')"
        required: true
        default: "all"

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          INPUT_VERSION="${{ github.event.inputs.php_version }}"
          if [ -n "$INPUT_VERSION" ] && [ "$INPUT_VERSION" != "all" ]; then
            echo "matrix=[\"$INPUT_VERSION\"]" >> $GITHUB_OUTPUT
          else
            # Extract values as a JSON array (e.g., ["7.4.33", "8.0.30", ...])
            VERSIONS=$(jq -c '[.[]]' manifests/php.json)
            echo "matrix=$VERSIONS" >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        php: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            bison \
            re2c \
            libxml2-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            libzip-dev \
            libsqlite3-dev \
            libpq-dev \
            libpng-dev \
            libjpeg-dev \
            libwebp-dev \
            libonig-dev

      - name: Make Build Scripts Executable
        run: chmod +x scripts/build-linux.sh

      - name: Compile and Package PHP Core & Extensions
        run: ./scripts/build-linux.sh "${{ matrix.php }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ matrix.php }}
          name: PHP Version ${{ matrix.php }}
          draft: false
          prerelease: false
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}