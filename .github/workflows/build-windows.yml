name: Build Windows

on:
  push:
    paths:
      - "manifests/php.json"
  workflow_dispatch:
    inputs:
      php_version:
        description: "PHP Version to build (e.g., 8.3.23 or 'all')"
        required: true
        default: "all"

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          INPUT_VERSION="${{ github.event.inputs.php_version }}"
          if [ -n "$INPUT_VERSION" ] && [ "$INPUT_VERSION" != "all" ]; then
            echo "matrix=[\"$INPUT_VERSION\"]" >> $GITHUB_OUTPUT
          else
            # Extract values as a JSON array
            VERSIONS=$(jq -c '[.[]]' manifests/php.json)
            echo "matrix=$VERSIONS" >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        php: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      # Build the core PHP runtime
      - name: Build PHP Core
        uses: php/php-windows-builder/php@v1
        with:
          php-version: ${{ matrix.php }}
          arch: x64
          ts: nts

      # Build Redis extension
      - name: Build Redis Extension
        uses: php/php-windows-builder/extension@v1
        with:
          extension-url: https://github.com/phpredis/phpredis
          extension-ref: ${{ (startsWith(matrix.php, '8.5') && '6.3.0') || (startsWith(matrix.php, '8.4') && '6.2.0') || '6.0.2' }}
          php-version: ${{ matrix.php }}
          arch: x64
          ts: nts
          php-build-path: ${{ github.workspace }}/artifacts

      # Build Xdebug extension
      - name: Build Xdebug Extension
        uses: php/php-windows-builder/extension@v1
        with:
          extension-url: https://github.com/xdebug/xdebug
          extension-ref: ${{ (startsWith(matrix.php, '7.4') && '3.1.6') || (startsWith(matrix.php, '8.5') && '3.5.3') || (startsWith(matrix.php, '8.4') && '3.5.3') || '3.4.4' }}
          php-version: ${{ matrix.php }}
          arch: x64
          ts: nts
          php-build-path: ${{ github.workspace }}/artifacts

      # Build MongoDB extension
      - name: Build MongoDB Extension
        uses: php/php-windows-builder/extension@v1
        with:
          extension-url: https://github.com/mongodb/mongo-php-driver
          extension-ref: ${{ (startsWith(matrix.php, '7.4') || startsWith(matrix.php, '8.0')) && '1.21.0' || '2.3.3' }}
          php-version: ${{ matrix.php }}
          arch: x64
          ts: nts
          php-build-path: ${{ github.workspace }}/artifacts

      # Package the compiled core and extensions into separate zip files
      - name: Package Core and Extensions
        shell: powershell
        run: |
          $Version = "${{ matrix.php }}"
          $Arch = "x64"
          $OutputDir = "output"
          $ExtStageDir = "ext-stage"
          $DistDir = "artifacts"

          if (!(Test-Path $OutputDir)) { New-Item -ItemType Directory -Path $OutputDir }
          if (!(Test-Path $ExtStageDir)) { New-Item -ItemType Directory -Path $ExtStageDir }

          # Locate compiled DLLs in artifacts/ext
          $DistExtDir = Join-Path $DistDir "ext"
          if (Test-Path $DistExtDir) {
              Write-Host "==> Packaging dynamic extensions..."
              $Dlls = Get-ChildItem -Path $DistExtDir -Filter "*.dll"
              
              foreach ($Dll in $Dlls) {
                  $ExtName = $Dll.BaseName -replace '^php_', ''
                  $StagePath = Join-Path $ExtStageDir $ExtName
                  New-Item -Path $StagePath -ItemType Directory -Force | Out-Null
                  
                  # Copy the DLL to staging
                  Move-Item -Path $Dll.FullName -Destination $StagePath
                  
                  # Generate the loading .ini configuration file
                  $IniFile = Join-Path $StagePath "$ExtName.ini"
                  if ($ExtName -eq "opcache") {
                      "zend_extension=php_opcache.dll" | Out-File -FilePath $IniFile -Encoding utf8
                  } else {
                      "extension=php_$ExtName.dll" | Out-File -FilePath $IniFile -Encoding utf8
                  }
                  
                  # Compress extension
                  $ZipName = "ext-$Version-$ExtName-windows-$Arch.zip"
                  $ZipPath = Join-Path $OutputDir $ZipName
                  Compress-Archive -Path "$StagePath\*" -DestinationPath $ZipPath -Force
                  Write-Host "    - packaged extension: $ZipName"
              }
              
              # Remove the empty ext folder from core package
              Remove-Item $DistExtDir -Recurse -Force
          }

          # Package the remaining core PHP runtime files
          Write-Host "==> Packaging PHP Core..."
          $CoreZipPath = Join-Path $OutputDir "php-$Version-windows-$Arch.zip"
          Compress-Archive -Path "$DistDir\*" -DestinationPath $CoreZipPath -Force
          Write-Host "    - packaged core: php-$Version-windows-$Arch.zip"

      # Upload packaged zip files to GitHub Releases
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ matrix.php }}
          name: PHP Version ${{ matrix.php }}
          draft: false
          prerelease: false
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}