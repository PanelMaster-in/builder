name: Discover PHP

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install
      - run: npm run discover

      - uses: actions/upload-artifact@v4
        with:
          name: php-manifest
          path: manifests/php.json