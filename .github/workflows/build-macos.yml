name: Build macOS

on:
  push:
    paths:
      - "manifests/php.json"
  workflow_dispatch:
    inputs:
      php_version:
        description: "Exact PHP version (e.g. 8.3.23) or 'all'"
        required: true
        default: "all"

permissions:
  contents: write

jobs:
  # ── Compute matrix from manifest ────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          INPUT="${{ github.event.inputs.php_version }}"
          if [ -n "$INPUT" ] && [ "$INPUT" != "all" ]; then
            echo "matrix=[\"$INPUT\"]" >> $GITHUB_OUTPUT
          else
            echo "matrix=$(jq -c '[.[]]' manifests/php.json)" >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        # macos-13 = Intel x64 | macos-14 = Apple Silicon ARM64
        os: [macos-13, macos-14]
        php: ${{ fromJson(needs.setup.outputs.matrix) }}

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Build Dependencies (Homebrew)
        run: |
          # FIX: correct formula names used here:
          #   jpeg        (NOT libjpeg)
          #   libwebp     (NOT webp)
          # Also include icu4c (for intl), libxml2, oniguruma (mbstring),
          # imagemagick (for imagick PECL), and bison (macOS ships bison 2.3).
          brew install \
            autoconf \
            bison \
            re2c \
            pkg-config \
            openssl@3 \
            curl \
            libzip \
            libxml2 \
            jpeg \
            webp \
            libpng \
            oniguruma \
            icu4c \
            imagemagick \
            postgresql@16

      - name: Make script executable
        run: chmod +x scripts/build-macos.sh

      - name: Build PHP ${{ matrix.php }}
        run: ./scripts/build-macos.sh "${{ matrix.php }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ matrix.php }}
          name: "PHP ${{ matrix.php }}"
          draft: false
          prerelease: false
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}