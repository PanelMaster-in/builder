name: Build macOS

on:
  push:
    paths:
      - "manifests/php.json"
  workflow_dispatch:
    inputs:
      php_version:
        description: "PHP Version to build (e.g., 8.3.23 or 'all')"
        required: true
        default: "all"

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          INPUT_VERSION="${{ github.event.inputs.php_version }}"
          if [ -n "$INPUT_VERSION" ] && [ "$INPUT_VERSION" != "all" ]; then
            echo "matrix=[\"$INPUT_VERSION\"]" >> $GITHUB_OUTPUT
          else
            # Extract values as a JSON array
            VERSIONS=$(jq -c '[.[]]' manifests/php.json)
            echo "matrix=$VERSIONS" >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-13 # Intel x64 architecture
          - macos-14 # Apple Silicon ARM64 architecture
        php: ${{ fromJson(needs.setup.outputs.matrix) }}

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Build Dependencies (Homebrew)
        run: |
          brew install \
            autoconf \
            bison \
            re2c \
            openssl \
            curl \
            libzip \
            libpng \
            libjpeg \
            webp \
            oniguruma

      - name: Make Build Scripts Executable
        run: chmod +x scripts/build-macos.sh

      - name: Compile and Package PHP Core & Extensions
        run: ./scripts/build-macos.sh "${{ matrix.php }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ matrix.php }}
          name: PHP Version ${{ matrix.php }}
          draft: false
          prerelease: false
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}